packages:
  - "packages/*"
allowBuilds:
  esbuild: set this to true or false
  lefthook: set this to true or false
  protobufjs: set this to true or false
  sharp: set this to true or false

ignoredBuiltDependencies:
  - msw
  - sharp
  - unrs-resolver
shellEmulator: true

trustPolicy: no-downgrade

# Known false positives — these packages were published before npm provenance
# became available, so their "trust downgrade" is expected and safe.
trustPolicyExclude:
  - "semver@6.3.1"
